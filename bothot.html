<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic Tac Toe(HARD BOT)</title>
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            margin: 0;
            padding: 20px;
            background-color: orangered;
            text-align: center;
            font-family: sans-serif;
        }
        .board {
            width: min(260px, 95vw);
            margin: 20px auto;
            padding: 10px;
            cursor: pointer;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            border: 2px solid black;
            border-radius: 5px;
            background-color: #f9ece8;
        }
        .cell {
            aspect-ratio: 1;
            min-height: 50px;
            background-color: aliceblue;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            border: 2px solid black;
            border-radius: 5px;
            font-size: 1.5rem;
        }
        h1 {
            text-decoration: underline;
            font-size: 40px;
        }
        p {
            font-size: large;
        }
    </style>
</head>
<body>
    <h1>Tic Tac Toe(Hard Bot)</h1>
    <h2>INSTRUCTIONS</h2>
   <p>You will be the first person to start if you play with Hardest Bot</p>
    <p>You will be playing against the Bot(Be Careful....!)</p>
    <div class="board">
        <div class="cell" id="1"></div><div class="cell" id="2"></div><div class="cell" id="3"></div>
        <div class="cell" id="4"></div><div class="cell" id="5"></div><div class="cell" id="6"></div>
        <div class="cell" id="7"></div><div class="cell" id="8"></div><div class="cell" id="9"></div>
    </div>
    <div id="current">Player X Turn</div>
    <button id="rst-btn">Reset Game</button>
    <script>
        const cells=document.querySelectorAll(".cell");
        const current = document.getElementById("current");
        const rstbtn = document.getElementById("rst-btn");
        
        let board = ["","","","","","","","",""];
        let isgame = true;
        let botTimeout;
        const p = "X"
        const win = [[0, 1, 2], [3, 4, 5], [6, 7, 8], [0, 3, 6], [1, 4, 7], [2, 5, 8], [0, 4, 8], [2, 4, 6]];
        function pp(e){
            let i = e.target.id-1;

            if (board[i] !== "" || isgame === false) {
                return;
            }
            board[i] = p;
            e.target.innerText = p;

            if(win_check(board , p)){
                current.innerText=" player has won";
                isgame = false;
                return;
            }
            if(!board.includes("")){
                current.innerText="Match has been Draw";
                isgame=false;
                return;
            }
            current.innerText="";
            botTimeout = setTimeout(botm, 500);

        }
        let bot = "O";
        function win_check(board,p){
            for(let val of win){
                let a = board[val[0]];
                let b = board[val[1]];
                let c = board[val[2]];
                if(a===p&& b===p&&c===p){
                return true;
            }
            
            }

            return false;
        }
        function botm(){
            let m = a(board,bot).index;
            board[m]=bot;
            document.getElementById(m+1).innerText=bot;

            if (win_check(board, bot)) {
                current.innerText="You have lost the match";
                isgame=false;
                return;
            }
            if(!board.includes("")){
                current.innerText="draw";
                isgame=false;
                return;
            }
            current.innerText="Player x turn";
        }
        function a(board1,player){
            let khali=[];
            let b = board1.length
            for (let i = 0;i<b;i++){
                if(board1[i]==="")khali.push(i);
            }
            if (win_check(board1, p)) {
                return { score: -10 };
            }
            if (win_check(board1, bot)) {
                return { score: 10 }
            }
            if (khali.length === 0) {
                return { score: 0 };
            }
            let moves = [];

            for(let i = 0;i<khali.length;i++){
                let move = {};
                move.index= khali[i];
                board1[khali[i]] = player;

                if(player === bot){
                    move.score = a(board1,p).score;
                }else {
                    move.score = a(board1, bot).score;
                }
                board1[khali[i]]=""; 
                moves.push(move);
            }
            let nice = 0;
            if (player === bot) {
                let max_score = -100;
                for (let i = 0; i < moves.length; i++) {
                    if (moves[i].score > max_score) {
                        max_score = moves[i].score;
                        nice = i;
                    }
                }
            } else {
                let min_score = 1000;
                for (let i = 0; i < moves.length; i++) {
                    if (moves[i].score < min_score) {
                        min_score = moves[i].score;
                        nice = i;
                    }
                }
            }
            return moves[nice]; 
        }
        cells.forEach(cell => {
            cell.addEventListener("click", pp)
        });
        rstbtn.addEventListener("click", () => {
            clearTimeout(botTimeout);
            board = ["", "", "", "", "", "", "", "", ""];
            isgame = true;
            cells.forEach(cell => cell.innerText = "");
            current.innerText = "Player X Turn";
        });
        
    </script>
</body>
</html>
