<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic Tac Toe(HARD BOT)</title>
    <style>
     *{
        background-color: orangered;
        text-align: center;
     }
     .board{
        height: 220px;
        width:220px;
        margin-left: 650px;
        cursor: pointer;
        display: flex;
        flex-wrap: wrap;
        border: 2px solid black;
        border-radius: 5px;
     }
     .cell{
        height: 50px;
        width: 50px;
        background-color: aliceblue;
        margin: 10px;
        cursor: pointer;
        display:flex;
        justify-content: center;
        align-items: center;
        border: 2px solid black;
        border-radius: 5px;
     }
     p{
        font-size: large;
     }
    </style>
</head>
<body>
    <h1>Tic Tac Toe(Hard Bot)</h1>
    <h2>INSTRUCTIONS</h2>
   <p>You will be the first person to start if you play with Hardest Bot</p>
    <p>You will be playing against the Bot(Be Careful....!)</p>
    <div class="board">
        <div class="cell" id="1"></div><div class="cell" id="2"></div><div class="cell" id="3"></div>
        <div class="cell" id="4"></div><div class="cell" id="5"></div><div class="cell" id="6"></div>
        <div class="cell" id="7"></div><div class="cell" id="8"></div><div class="cell" id="9"></div>
    </div>
    <div id="current">Player X Turn</div>
    <button id="rst-btn">Reset Game</button>
    <script>
        
    </script>
</body>
</html>
