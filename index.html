<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic Tac Toe</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: Arial, sans-serif;
            background-color: lightpink;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            text-align: center;
            max-width: 600px;
            width: 100%;
            background: white;
            padding: 30px;
        }
        h1 {
            font-size: 3rem;
            margin-bottom: 18px;
            text-decoration: underline;
            color: #0d47a1;
        }
        p {
            font-size: 1rem;
            line-height: 1.6;
            margin-bottom: 30px;
        }
        .buttons {
            display: flex;
            flex-direction: column;
            gap: 16px;
            align-items: center;
        }
        .buttons a {
            display: inline-block;
            width: 100%;
            max-width: 260px;
            padding: 14px 18px;
            background-color: #0d47a1;
            color: white;
            text-decoration: none;
            border-radius: 8px;
        }
        .buttons a:hover {
            background-color: #1565c0;
        }
        @media (min-width: 600px) {
            .buttons {
                flex-direction: row;
                justify-content: center;
            }
            .buttons a {
                width: auto;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Tic Tac Toe</h1>
        <p>Choose how you want to play: against the bot or with a friend. Click one of the options below to start the game.</p>
        <div class="buttons">
            <a href="choose.html">Play vs Bot</a>
            <a href="2player.html">2 Player</a>
        </div>
    </div>
</body>
</html>
