<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic Tac Toe</title>
    <style>
        *{
            background-color: lightpink;
        }
        .board {
                height: 230px;
                width: 220px;
                margin:10px;
                cursor: pointer;
                display: flex;
                flex-wrap: wrap;
                border: 2px solid brown; 
                border-radius: 5px;
        }
        .cell{
            height: 50px;
            width: 50px;
            background-color:white;
            margin:10px;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            border: 2px solid #055c84; 
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <h1>Tic Tac Toe <h3>(Two Player)</h3></h1>
    <div class="board">
        <div class="cell" id="1"></div><div class="cell" id="2"></div><div class="cell" id="3"></div>
        <div class="cell" id="4"></div><div class="cell" id="5"></div><div class="cell" id="6"></div>
        <div class="cell" id="7"></div><div class="cell" id="8"></div><div class="cell" id="9"></div>


    </div>
    <div id="current">Player X Turn</div>
    <button id="rst-btn">Reset Game</button>
    <script>
        const cells = document.querySelectorAll(".cell");
        const current = document.getElementById("current");
        const rst = document.getElementById("rst-btn");
        let isgame = true;
        let currentPlayer = "X";
        let board = ["", "", "", "", "", "", "", "", ""];
        let win = [[0, 1, 2], [3, 4, 5], [6, 7, 8], [0, 3, 6], [1, 4, 7], [2, 5, 8], [0, 4, 8], [2, 4, 6]];

        cells.forEach(cell => cell.addEventListener("click", handleClick));

        function handleClick(e) {
            let cell = e.target;
            let index = parseInt(cell.id) - 1;

            if (board[index] === "" && isgame === true) {
                textcell(cell, index);
                won(); 
            }
        }

        function won() {
            for (let val of win) {
                let a = board[val[0]];
                let b = board[val[1]];
                let c = board[val[2]];
                if (a !== "") {
                    if (a == b && b == c) {
                        isgame = false;
                        current.innerText = "Player " + a + " Won!";
                        return;
                    }
                }
            }
            if (!board.includes("")) {
                isgame = false;
                current.innerText = "Draw!";
                return;
            }
        }


        rst.addEventListener("click", reset);
        
        function textcell(cell, index) {
            board[index] = currentPlayer;
            cell.innerText = currentPlayer;
            currentPlayer = currentPlayer === "X" ? "O" : "X";
            if (isgame) {
                current.innerText = "Player " + currentPlayer + " Turn";
            }
        }

        function reset() {
            board = ["", "", "", "", "", "", "", "", ""];
            isgame = true;
            currentPlayer = "X";
            current.innerText = "Player X Turn";
            cells.forEach(
                cell => cell.innerText = ""
            );
        }

    </script>
</body>
</html>
